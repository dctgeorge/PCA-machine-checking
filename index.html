<!DOCTYPE html>

<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PT 設備管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#eef0f4;--card:#fff;--ink:#141825;--ink2:#555e70;--ink3:#99a1b3;
  --border:#e2e5ec;--accent:#1746a2;--accent-lt:#e8eefb;
  --green:#0d9f6e;--green-lt:#e6f9f1;--red:#d03050;--red-lt:#fcedef;
  --orange:#e07020;--orange-lt:#fef3e8;--blue:#2563eb;--blue-lt:#eff4ff;
  --r:14px;--rs:10px;
  --shadow:0 2px 10px rgba(20,24,37,.06);
  --shadow-lg:0 14px 44px rgba(20,24,37,.16);
  --font:'DM Sans','Noto Sans HK',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden}

.header{background:linear-gradient(135deg,#141825,#1c2541 55%,#1746a2);color:#fff;padding:22px 18px 16px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(20,24,37,.3)}
.header h1{font-size:20px;font-weight:800;letter-spacing:-.5px}
.header .sub{font-size:11px;opacity:.5;margin-top:3px;letter-spacing:.5px;text-transform:uppercase}
.header .status{position:absolute;right:18px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:#f59e0b;animation:pulse 1.5s infinite}
.dot.on{background:#0d9f6e;animation:none}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

.tab-bar{display:flex;gap:4px;overflow-x:auto;padding:0 14px 14px;background:linear-gradient(135deg,#141825,#1c2541 55%,#1746a2);position:sticky;top:61px;z-index:99;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:9px 16px;border-radius:22px;border:none;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.2s;font-family:var(–font);background:rgba(255,255,255,.12);color:rgba(255,255,255,.75)}
.tab-btn.active{background:#fff;color:var(–ink);font-weight:700}

.content{padding:16px;max-width:720px;margin:0 auto}
.hidden{display:none!important}

.card{background:var(–card);border-radius:var(–r);padding:16px;margin-bottom:12px;box-shadow:var(–shadow);border:1px solid var(–border)}
.card.bdr-green{border-left:4px solid var(–green)}.card.bdr-gray{border-left:4px solid var(–border)}
.card.bdr-red{border-left:4px solid var(–red)}.card.bdr-blue{border-left:4px solid var(–blue)}
.card.dim{opacity:.72}

.badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700}
.bg-green{background:var(–green-lt);color:var(–green)}.bg-red{background:var(–red-lt);color:var(–red)}
.bg-blue{background:var(–blue-lt);color:var(–blue)}.bg-orange{background:var(–orange-lt);color:var(–orange)}
.bg-ink{background:var(–accent-lt);color:var(–accent)}.bg-gray{background:#f0f1f5;color:var(–ink2)}

.btn{padding:11px 20px;border-radius:var(–rs);border:none;font-weight:700;cursor:pointer;font-size:13px;font-family:var(–font);transition:.15s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-pri{background:var(–ink);color:#fff}.btn-acc{background:var(–accent);color:#fff}
.btn-grn{background:var(–green);color:#fff}.btn-red{background:var(–red);color:#fff}
.btn-blu{background:var(–blue);color:#fff}.btn-gho{background:#f0f1f5;color:var(–ink)}
.btn-full{width:100%}.btn-sm{padding:7px 13px;font-size:12px;border-radius:8px}
.btn-xs{padding:5px 9px;font-size:11px;border-radius:6px;font-weight:600}

.fl{font-size:12px;font-weight:600;color:var(–ink2);margin-bottom:5px;display:block}
.fi,.fsel{width:100%;padding:11px 14px;border-radius:var(–rs);border:1.5px solid var(–border);font-size:14px;font-family:var(–font);background:var(–card);color:var(–ink);outline:none;transition:border .2s;margin-bottom:12px}
.fi:focus,.fsel:focus{border-color:var(–accent)}

.sw{position:relative;margin-bottom:14px}
.si-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;color:var(–ink3);pointer-events:none}
.si{width:100%;padding:11px 40px 11px 40px;border-radius:var(–rs);border:1.5px solid var(–border);font-size:14px;font-family:var(–font);background:#fafbfd;outline:none;transition:border .2s}
.si:focus{border-color:var(–accent);background:#fff}
.si-x{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:17px;cursor:pointer;color:var(–ink3)}

/* Zone filter pills */
.zone-pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.zone-pills::-webkit-scrollbar{display:none}
.zpill{padding:7px 14px;border-radius:20px;border:1.5px solid var(–border);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;background:#fff;color:var(–ink2);transition:.2s;font-family:var(–font)}
.zpill.active{background:var(–accent);color:#fff;border-color:var(–accent)}

.chk{width:30px;height:30px;border-radius:9px;border:2.5px solid var(–border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;background:#fff;font-size:16px;color:#fff;font-weight:800}
.chk.on{background:var(–green);border-color:var(–green)}

.eqr{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-top:1px solid #f3f4f7}
.eqr:first-child{border-top:none}

/* Remarks input inline */
.remark-input{width:100%;padding:6px 10px;border-radius:6px;border:1px solid var(–border);font-size:12px;font-family:var(–font);color:var(–ink);outline:none;margin-top:6px;background:#fafbfd;transition:border .2s}
.remark-input:focus{border-color:var(–accent);background:#fff}
.remark-input::placeholder{color:var(–ink3)}

/* Action buttons row */
.eq-actions{display:flex;gap:4px;margin-top:6px}

.sigp{height:38px;border-radius:6px;border:1px solid var(–border)}

.overlay{position:fixed;inset:0;z-index:7000;background:rgba(20,24,37,.5);display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;animation:fadeIn .2s}
.modal{background:#fff;border-radius:18px;padding:24px;width:100%;max-width:480px;margin:40px 0;box-shadow:var(–shadow-lg);animation:slideUp .25s}
.modal-w{max-width:620px}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mt-t{font-weight:800;font-size:18px;color:var(–ink)}
.mt-x{background:none;border:none;font-size:22px;cursor:pointer;color:var(–ink3);line-height:1}

.sig-ov{position:fixed;inset:0;z-index:9000;background:rgba(20,24,37,.55);display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .15s}
.sig-box{background:#fff;border-radius:18px;padding:22px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(20,24,37,.3)}
.sig-cv{width:100%;height:180px;border:2px solid var(–border);border-radius:var(–rs);background:#fafbfd;touch-action:none;cursor:crosshair;display:block}
.sig-acts{display:flex;gap:8px;margin-top:14px}
.sig-acts .btn{flex:1}.sig-acts .btn-pri{flex:2}

.zchip{display:inline-flex;align-items:center;padding:7px 14px;background:var(–accent-lt);color:var(–accent);border-radius:8px;font-size:13px;font-weight:600}

.empty{text-align:center;padding:44px 20px;color:var(–ink3)}
.empty i{font-size:42px;display:block;margin-bottom:12px;font-style:normal}

.adet{font-size:13px;margin:8px 0;padding:10px 14px;background:#fafbfd;border-radius:var(–rs)}

.loading-screen{position:fixed;inset:0;z-index:10000;background:var(–bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s}
.loading-screen.fade{opacity:0;pointer-events:none}
.spinner{width:40px;height:40px;border:4px solid var(–border);border-top-color:var(–accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(–ink);color:#fff;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;animation:toastIn .3s;box-shadow:var(–shadow-lg)}
.toast.out{animation:toastOut .3s forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(20px)}}

/* Signature box with actions */
.sig-area{margin-top:10px;padding:10px;border-radius:var(–rs)}
.sig-area.signed{background:var(–green-lt)}
.sig-area.unsigned{background:#f5f6f9}

.fx{display:flex}.g4{gap:4px}.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}
.fw{flex-wrap:wrap}.jb{justify-content:space-between}.ac{align-items:center}.as{align-items:flex-start}
.gr{flex:1}.s0{flex-shrink:0}.mw0{min-width:0}
.oe{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mt6{margin-top:6px}.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}
.mb6{margin-bottom:6px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}
.tar{text-align:right}.tac{text-align:center}
.f11{font-size:11px}.f12{font-size:12px}.f13{font-size:13px}.f14{font-size:14px}.f22{font-size:22px}
.w6{font-weight:600}.w7{font-weight:700}.w8{font-weight:800}
.cm{color:var(–ink3)}.c2{color:var(–ink2)}.cg{color:var(–green)}.co{color:var(–orange)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:400px){.header h1{font-size:17px}.tab-btn{font-size:12px;padding:8px 12px}.content{padding:12px}}
</style>

</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <div style="font-weight:700;color:var(--ink)">連接 Firebase 中...</div>
  <div style="font-size:12px;color:var(--ink3)">Loading equipment data</div>
</div>

<div class="header">
  <h1>⚕️ PT 設備管理系統</h1>
  <div class="sub">Physical Therapy Equipment Management</div>
  <div class="status"><div class="dot" id="syncDot"></div><span style="font-size:11px;opacity:.6" id="syncLabel">Syncing</span></div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="daily">📋 每日檢查</button>
  <button class="tab-btn" data-tab="remarks">📝 Remarks</button>
  <button class="tab-btn" data-tab="maint">🔧 維修紀錄</button>
  <button class="tab-btn" data-tab="transfer">🔄 轉移紀錄</button>
  <button class="tab-btn" data-tab="equip">📦 設備管理</button>
  <button class="tab-btn" data-tab="settings">⚙️ 設定</button>
</div>

<div class="content">

  <!-- ═══ DAILY ═══ -->

  <div id="tab-daily" class="tab-content">
    <div class="card">
      <div class="fx g8 ac fw">
        <div class="gr" style="min-width:160px">
          <label class="fl">選擇日期</label>
          <input type="date" id="dailyDate" class="fi" style="margin-bottom:0">
        </div>
        <div class="tar">
          <div class="f12 cm">簽名狀態</div>
          <div id="dailySigStatus" class="f22 w8 co">0/0</div>
        </div>
      </div>
    </div>
    <!-- Zone filter pills -->
    <div class="zone-pills" id="dailyZonePills"></div>
    <!-- Search -->
    <div class="sw">
      <span class="si-icon">🔍</span>
      <input type="text" id="dailySearch" class="si" placeholder="搜尋設備名稱 / Asset ID...">
      <button class="si-x hidden" id="dailySearchX">✕</button>
    </div>
    <div id="dailyZoneList"></div>
    <button class="btn btn-pri btn-full mt8" style="padding:14px" onclick="exportMonthly()">
      📊 匯出 <span id="exportMonth"></span> 月份報告 (Excel)
    </button>
  </div>

  <!-- ═══ REMARKS ═══ -->

  <div id="tab-remarks" class="tab-content hidden">
    <div class="card">
      <div class="fx g8 ac fw">
        <div class="gr" style="min-width:160px">
          <label class="fl">選擇日期</label>
          <input type="date" id="remarksDate" class="fi" style="margin-bottom:0">
        </div>
        <div class="tar">
          <div class="f12 cm">有 Remarks 設備</div>
          <div id="remarksCount" class="f22 w8" style="color:var(--accent)">0</div>
        </div>
      </div>
    </div>
    <div class="zone-pills" id="remarksZonePills"></div>
    <div id="remarksList"></div>
  </div>

  <!-- ═══ MAINT ═══ -->

  <div id="tab-maint" class="tab-content hidden">
    <div class="zone-pills" id="maintZonePills"></div>
    <div id="maintList"></div>
  </div>

  <!-- ═══ TRANSFER ═══ -->

  <div id="tab-transfer" class="tab-content hidden">
    <div class="zone-pills" id="transZonePills"></div>
    <div id="transferList"></div>
  </div>

  <!-- ═══ EQUIP ═══ -->

  <div id="tab-equip" class="tab-content hidden">
    <div class="fx g8 fw mb14">
      <button class="btn btn-pri gr" style="min-width:100px" onclick="openEquipForm()">+ 新增設備</button>
      <button class="btn btn-acc gr" style="min-width:100px" onclick="importCSV()">📄 匯入 CSV</button>
      <button class="btn btn-gho gr" style="min-width:100px" onclick="downloadTemplate()">⬇ 下載模板</button>
    </div>
    <div class="zone-pills" id="equipZonePills"></div>
    <div class="sw">
      <span class="si-icon">🔍</span>
      <input type="text" id="equipSearch" class="si" placeholder="搜尋設備名稱 / Asset ID...">
      <button class="si-x hidden" id="equipSearchX">✕</button>
    </div>
    <div id="equipCount" class="f13 cm mb10"></div>
    <div id="equipList"></div>
  </div>

  <!-- ═══ SETTINGS ═══ -->

  <div id="tab-settings" class="tab-content hidden">
    <div class="card">
      <div class="w7 f14 mb12">📍 Zone 管理</div>
      <div id="settingsZoneChips" class="fx g8 fw mb12"></div>
      <button class="btn btn-pri btn-full" onclick="openZoneManager()">管理 Zones</button>
    </div>
    <div class="card">
      <div class="w7 f14 mb12">📊 匯出報告</div>
      <div class="f13 cm mb12">匯出選定月份的完整紀錄至 Excel</div>
      <input type="month" id="settingsMonth" class="fi">
      <button class="btn btn-acc btn-full" onclick="exportMonthly()">📥 匯出 Excel</button>
    </div>
    <div class="card">
      <div class="w7 f14 mb12">📄 CSV 工具</div>
      <div class="fx g8">
        <button class="btn btn-gho gr" onclick="downloadTemplate()">⬇ 下載空白模板</button>
        <button class="btn btn-pri gr" onclick="importCSV()">📄 匯入 CSV</button>
      </div>
    </div>
    <div class="card">
      <div class="w7 f14 mb6" style="color:var(--red)">⚠️ 清除所有設備</div>
      <div class="f13 cm mb12">此操作不可還原</div>
      <button class="btn btn-red btn-full" onclick="clearAllData()">清除全部資料</button>
    </div>
    <div class="tac" style="padding:24px;color:var(--ink3);font-size:11px">PT Equipment Management System v4.0 · Firebase Cloud</div>
  </div>
</div>

<div id="modalBox"></div>
<div id="sigBox"></div>

<script>
// ═══════════════════════════════════════════════
//  FIREBASE
// ═══════════════════════════════════════════════
firebase.initializeApp({
  apiKey:"AIzaSyAAhB67u8MOs4GStBg46M-FgTfCLms_mB8",
  authDomain:"pca-machine-checking.firebaseapp.com",
  projectId:"pca-machine-checking",
  storageBucket:"pca-machine-checking.firebasestorage.app",
  messagingSenderId:"132305266316",
  appId:"1:132305266316:web:043bc5f5db66644d52bda9"
});
const db=firebase.firestore();
db.enablePersistence({synchronizeTabs:true}).catch(e=>console.warn("Persistence:",e.code));

/*
  Firestore:
  config/zones → {list:[...]}
  equipment/{id} → {zone,name,commonName,location,assetId,serialNumber}
  maintenance/{id} → {equipmentId,date,action,signature,completed,completedDate}
  transfers/{id} → {equipmentId,sendDate,destination,signature,returned,returnedDate}
  dailyChecks/{date} → {checks:{eqId:true},remarks:{eqId:"text"}}
  signatures/{date} → {"Zone A":{img,time},...}
*/

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const DEFAULT_ZONES=["Zone A","Zone B","Zone C","Consultation Room","4/F Storeroom","7/F IRA","8/F IRA"];
let D={zones:[...DEFAULT_ZONES],equipment:[],maintenance:[],transfers:[]};
let checksCache={},remarksCache={},sigsCache={};
let loadCount=0;const LOAD_TARGET=4;
// Zone filters per tab
let dailyZoneFilter="all", maintZoneFilter="all", transZoneFilter="all", remarksZoneFilter="all", equipZoneFilter="all";
// Remark debounce timers
let remarkTimers={};
// Separate cache for Remarks page date
let remarksPageData={checks:{},remarks:{}};

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function uid(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4)}
function fmt(d){if(!d)return"—";const p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0]}
function todayStr(){return new Date().toISOString().slice(0,10)}
function esc(s){if(!s)return"";const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function $(id){return document.getElementById(id)}
function getDate(){return $("dailyDate").value||todayStr()}
function getMonth(){return getDate().slice(0,7)}
function setSync(ok){$("syncDot").className=ok?"dot on":"dot";$("syncLabel").textContent=ok?"Connected":"Syncing"}
function toast(msg){
  const el=document.createElement("div");el.className="toast";el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>{el.className="toast out";setTimeout(()=>el.remove(),300)},2200);
}
function markLoaded(){
  loadCount++;
  if(loadCount>=LOAD_TARGET){
    const ls=$("loadingScreen");ls.classList.add("fade");setTimeout(()=>ls.style.display="none",500);
    setSync(true);setupDateListeners(getDate());
  }
}

// ═══════════════════════════════════════════════
//  FIRESTORE LISTENERS
// ═══════════════════════════════════════════════
db.collection("config").doc("zones").onSnapshot(doc=>{
  if(doc.exists) D.zones=doc.data().list||DEFAULT_ZONES;
  else db.collection("config").doc("zones").set({list:DEFAULT_ZONES});
  markLoaded();renderAll();
},e=>{console.error(e);markLoaded()});

db.collection("equipment").orderBy("zone").onSnapshot(snap=>{
  D.equipment=snap.docs.map(d=>({id:d.id,...d.data()}));
  markLoaded();renderAll();
},e=>{console.error(e);markLoaded()});

db.collection("maintenance").orderBy("date","desc").onSnapshot(snap=>{
  D.maintenance=snap.docs.map(d=>({id:d.id,...d.data()}));
  markLoaded();renderAll();
},e=>{console.error(e);markLoaded()});

db.collection("transfers").orderBy("sendDate","desc").onSnapshot(snap=>{
  D.transfers=snap.docs.map(d=>({id:d.id,...d.data()}));
  markLoaded();renderAll();
},e=>{console.error(e);markLoaded()});

let dateUnsubs={c:null,s:null};
function setupDateListeners(date){
  if(dateUnsubs.c)dateUnsubs.c();if(dateUnsubs.s)dateUnsubs.s();
  dateUnsubs.c=db.collection("dailyChecks").doc(date).onSnapshot(doc=>{
    const data=doc.exists?doc.data():{};
    checksCache[date]=data.checks||{};
    remarksCache[date]=data.remarks||{};
    renderDaily();
  });
  dateUnsubs.s=db.collection("signatures").doc(date).onSnapshot(doc=>{
    sigsCache[date]=doc.exists?doc.data():{};
    renderDaily();
  });
}

// ═══════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════
let curTab="daily";
document.querySelectorAll(".tab-btn").forEach(b=>{
  b.addEventListener("click",()=>{
    curTab=b.dataset.tab;
    document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    document.querySelectorAll(".tab-content").forEach(c=>c.classList.add("hidden"));
    $("tab-"+curTab).classList.remove("hidden");
    renderAll();
  });
});

// ═══════════════════════════════════════════════
//  COMPUTED
// ═══════════════════════════════════════════════
function equipByZone(){
  const m={};D.zones.forEach(z=>{m[z]=[]});
  D.equipment.forEach(e=>{if(!m[e.zone])m[e.zone]=[];m[e.zone].push(e)});return m;
}
function activeMaintIds(){return new Set(D.maintenance.filter(m=>!m.completed).map(m=>m.equipmentId))}

let _sigCv,_sigCx,_sigDr=false,_sigLt=null,_sigRes=null;
function openSignPad(label){
  return new Promise(resolve=>{
    _sigRes=resolve;
    $("sigBox").innerHTML=`<div class="sig-ov" onclick="_sigCancel()"><div class="sig-box" onclick="event.stopPropagation()">
      <div class="w7 f14" style="margin-bottom:3px">${esc(label)}</div>
      <div class="f12 cm mb12">請在下方空白處簽名</div>
      <canvas id="sigCv" class="sig-cv"></canvas>
      <div class="sig-acts">
        <button class="btn btn-gho" onclick="_sigClear()">清除</button>
        <button class="btn btn-gho" onclick="_sigCancel()">取消</button>
        <button class="btn btn-pri" onclick="_sigSave()">確認簽名</button>
      </div></div></div>`;
    _sigCv=$("sigCv");_sigCx=_sigCv.getContext("2d");
    _sigCv.width=_sigCv.offsetWidth*2;_sigCv.height=_sigCv.offsetHeight*2;
    _sigCx.scale(2,2);_sigCx.strokeStyle="#141825";_sigCx.lineWidth=2;_sigCx.lineCap="round";_sigCx.lineJoin="round";
    _sigDr=false;_sigLt=null;
    _sigCv.addEventListener("mousedown",_sS);_sigCv.addEventListener("mousemove",_sM);
    _sigCv.addEventListener("mouseup",_sE);_sigCv.addEventListener("mouseleave",_sE);
    _sigCv.addEventListener("touchstart",_sS,{passive:false});_sigCv.addEventListener("touchmove",_sM,{passive:false});_sigCv.addEventListener("touchend",_sE);
  });
}
function _sP(e){const r=_sigCv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
function _sS(e){e.preventDefault();_sigDr=true;_sigLt=_sP(e)}
function _sM(e){if(!_sigDr)return;e.preventDefault();const p=_sP(e);_sigCx.beginPath();_sigCx.moveTo(_sigLt.x,_sigLt.y);_sigCx.lineTo(p.x,p.y);_sigCx.stroke();_sigLt=p}
function _sE(){_sigDr=false;_sigLt=null}
function _sigClear(){_sigCx.clearRect(0,0,_sigCv.width,_sigCv.height)}
function _sigCancel(){$("sigBox").innerHTML="";if(_sigRes){_sigRes(null);_sigRes=null}}
function _sigSave(){
  const px=_sigCx.getImageData(0,0,_sigCv.width,_sigCv.height).data;
  let blank=true;for(let i=3;i<px.length;i+=4){if(px[i]>0){blank=false;break}}
  if(blank){alert("請先簽名！");return}
  const img=_sigCv.toDataURL("image/png");
  $("sigBox").innerHTML="";if(_sigRes){_sigRes(img);_sigRes=null}
}

// ── Daily actions ──
function checkAllZone(zone){
  const date=getDate(),checks={...(checksCache[date]||{})};
  const eq=(equipByZone()[zone]||[]);
  const all=eq.every(e=>checks[e.id]);
  eq.forEach(e=>{if(all)delete checks[e.id];else checks[e.id]=true});
  checksCache[date]=checks;renderDaily();
  db.collection("dailyChecks").doc(date).set({checks,remarks:remarksCache[date]||{}},{merge:false}).catch(console.error);
}

function toggleChk(id){
  const date=getDate(),checks={...(checksCache[date]||{})};
  if(checks[id])delete checks[id];else checks[id]=true;
  checksCache[date]=checks;renderDaily();
  db.collection("dailyChecks").doc(date).set({checks,remarks:remarksCache[date]||{}},{merge:false}).catch(console.error);
}

function debouncedRemark(eqId,val){
  clearTimeout(remarkTimers[eqId]);
  remarkTimers[eqId]=setTimeout(()=>saveRemark(eqId,val),600);
}

function saveRemark(eqId,val){
  clearTimeout(remarkTimers[eqId]);
  const date=getDate();
  const remarks={...(remarksCache[date]||{})};
  if(val.trim())remarks[eqId]=val.trim();else delete remarks[eqId];
  remarksCache[date]=remarks;
  db.collection("dailyChecks").doc(date).set({checks:checksCache[date]||{},remarks},{merge:false}).catch(console.error);
}

async function signZone(zone){
  const img=await openSignPad("簽名確認 — "+zone+" · "+fmt(getDate()));
  if(!img)return;
  db.collection("signatures").doc(getDate()).set({[zone]:{img,time:new Date().toISOString()}},{merge:true})
    .then(()=>toast("已簽名 ✓")).catch(console.error);
}

async function resignZone(zone){
  const img=await openSignPad("重新簽名 — "+zone+" · "+fmt(getDate()));
  if(!img)return;
  db.collection("signatures").doc(getDate()).set({[zone]:{img,time:new Date().toISOString()}},{merge:true})
    .then(()=>toast("已重新簽名 ✓")).catch(console.error);
}

function cancelSig(zone){
  if(!confirm("確定取消「"+zone+"」的簽名？"))return;
  const date=getDate();
  // Use FieldValue.delete() to remove the zone field
  db.collection("signatures").doc(date).update({
    [zone]:firebase.firestore.FieldValue.delete()
  }).then(()=>toast("已取消簽名")).catch(console.error);
}

function getRemarksDate(){return $("remarksDate")?.value||todayStr()}
function setRemarksZone(z){remarksZoneFilter=z;renderRemarks()}

async function loadRemarksForDate(date){
  try{
    const doc=await db.collection("dailyChecks").doc(date).get();
    if(doc.exists){const d=doc.data();remarksPageData={checks:d.checks||{},remarks:d.remarks||{}}}
    else remarksPageData={checks:{},remarks:{}};
  }catch(e){console.error(e);remarksPageData={checks:{},remarks:{}};}
  renderRemarks();
}

function renderRemarks(){
  const dateEl=$("remarksDate");
  if(!dateEl)return;
  const date=getRemarksDate();

  // If this date matches the daily tab date, use live cache; otherwise use separately fetched data
  let remarks,checks;
  if(date===getDate()){
    remarks=remarksCache[date]||{};
    checks=checksCache[date]||{};
  } else {
    remarks=remarksPageData.remarks||{};
    checks=remarksPageData.checks||{};
  }

  renderZonePills("remarksZonePills",remarksZoneFilter,"setRemarksZone");

  // Filter equipment that has a remark on this date
  const remarkedEqs=D.equipment.filter(e=>remarks[e.id]&&remarks[e.id].trim());
  let filtered=remarkedEqs;
  if(remarksZoneFilter!=="all") filtered=filtered.filter(e=>e.zone===remarksZoneFilter);

  $("remarksCount").textContent=remarkedEqs.length;

  if(!filtered.length){
    $("remarksList").innerHTML=`<div class="card"><div class="empty"><i>📝</i><div>${remarkedEqs.length===0?'此日期沒有任何 Remarks':'此區域沒有 Remarks'}</div>
      <div class="f12" style="margin-top:4px">${remarkedEqs.length===0?'當設備在每日檢查中填寫 Remarks 後會顯示於此':'請選擇其他區域'}</div></div></div>`;
    return;
  }

  // Group by zone
  const byZone={};
  filtered.forEach(e=>{if(!byZone[e.zone])byZone[e.zone]=[];byZone[e.zone].push(e)});

  let h="";
  Object.keys(byZone).forEach(zone=>{
    h+=`<div class="card">
      <div class="fx ac g8 mb12"><div class="w8 f14">${esc(zone)}</div><span class="badge bg-orange">${byZone[zone].length} remarks</span></div>`;
    byZone[zone].forEach(e=>{
      const rm=remarks[e.id]||"";
      const c=!!checks[e.id];
      h+=`<div style="padding:10px 0;border-top:1px solid #f3f4f7">
        <div class="fx ac g8 mb6">
          <span class="badge ${c?'bg-green':'bg-red'}" style="font-size:10px">${c?'✓ Checked':'✗ Unchecked'}</span>
          <span class="w6 f13">${esc(e.name)}</span>
        </div>
        <div class="f12 cm mb6">${esc(e.commonName)} · ${esc(e.assetId)}</div>
        <div style="padding:8px 12px;background:#fff8ec;border-left:3px solid var(--orange);border-radius:0 var(--rs) var(--rs) 0;font-size:13px;color:var(--ink)">
          ${esc(rm)}
        </div>
      </div>`;
    });
    h+=`</div>`;
  });
  $("remarksList").innerHTML=h;
}

// ═══════════════════════════════════════════════
//  CSV
// ═══════════════════════════════════════════════
function parseCSVLine(line){const r=[];let c="",q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(q){if(ch==='"'&&line[i+1]==='"'){c+='"';i++}else if(ch==='"')q=false;else c+=ch}else{if(ch==='"')q=true;else if(ch===','){r.push(c);c=""}else c+=ch}}r.push(c);return r}

async function importCSV(){
  const inp=document.createElement("input");inp.type="file";inp.accept=".csv";
  inp.onchange=async e=>{
    const f=e.target.files[0];if(!f)return;const text=await f.text();
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2){alert("CSV 無資料行");return}
    const hd=lines[0].replace(/[\ufeff]/g,"").split(",").map(h=>h.trim().toLowerCase());
    const fi=(...ns)=>hd.findIndex(h=>ns.includes(h));
    const zI=fi("zone"),nI=fi("名稱","name"),cI=fi("common name","commonname","common_name");
    const lI=fi("location"),aI=fi("asset id","assetid","asset_id"),sI=fi("serial number","serialnumber","serial_number");
    if([zI,nI,cI,lI,aI,sI].some(x=>x<0)){alert("CSV 欄位不符");return}
    const items=[];
    for(let i=1;i<lines.length;i++){const cols=parseCSVLine(lines[i]);if(cols.length<6)continue;items.push({zone:cols[zI].trim(),name:cols[nI].trim(),commonName:cols[cI].trim(),location:cols[lI].trim(),assetId:cols[aI].trim(),serialNumber:cols[sI].trim()})}
    if(!items.length){alert("無有效資料");return}
    for(let s=0;s<items.length;s+=450){const batch=db.batch();items.slice(s,s+450).forEach(item=>{batch.set(db.collection("equipment").doc(uid()),item)});await batch.commit()}
    const nz=[...new Set(items.map(i=>i.zone))].filter(z=>!D.zones.includes(z));
    if(nz.length){D.zones.push(...nz);saveZones()}
    toast(`成功匯入 ${items.length} 件設備！`);
  };inp.click();
}

function downloadTemplate(){
  const b=new Blob(["\ufeffZone,名稱,Common Name,Location,Asset ID,Serial Number\n"],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="equipment_template.csv";a.click();URL.revokeObjectURL(a.href);
}

// ═══════════════════════════════════════════════
//  EXCEL EXPORT (with Remarks column)
// ═══════════════════════════════════════════════
async function exportMonthly(){
  const mo=getMonth(),yr=+mo.slice(0,4),mn=+mo.slice(5,7),days=new Date(yr,mn,0).getDate();
  toast("正在匯出...");
  const startD=mo+"-01",endD=mo+"-31";
  const [cSnap,sSnap]=await Promise.all([
    db.collection("dailyChecks").where(firebase.firestore.FieldPath.documentId(),">=",startD).where(firebase.firestore.FieldPath.documentId(),"<=",endD).get(),
    db.collection("signatures").where(firebase.firestore.FieldPath.documentId(),">=",startD).where(firebase.firestore.FieldPath.documentId(),"<=",endD).get()
  ]);
  const aC={},aS={};
  cSnap.forEach(d=>{const dd=d.data();aC[d.id]={checks:dd.checks||{},remarks:dd.remarks||{}}});
  sSnap.forEach(d=>{aS[d.id]=d.data()});

  const r1=[["日期","Zone","設備名稱","Common Name","Asset ID","檢查狀態","Remarks","Zone簽名狀態"]];
  for(let d=1;d<=days;d++){
    const dt=`${mo}-${String(d).padStart(2,"0")}`;
    const dc=aC[dt]||{checks:{},remarks:{}};const sg=aS[dt]||{};
    D.equipment.forEach(eq=>{
      r1.push([fmt(dt),eq.zone,eq.name,eq.commonName,eq.assetId,dc.checks[eq.id]?"✓":"✗",dc.remarks[eq.id]||"",sg[eq.zone]?"已簽":"未簽"]);
    });
  }
  const ws1=XLSX.utils.aoa_to_sheet(r1);

  const r2=[["日期","設備名稱","Asset ID","Zone","維修動作","狀態","完成日期"]];
  D.maintenance.filter(m=>m.date&&m.date.startsWith(mo)).forEach(m=>{
    const eq=D.equipment.find(e=>e.id===m.equipmentId);
    r2.push([fmt(m.date),eq?.name||"—",eq?.assetId||"—",eq?.zone||"—",m.action,m.completed?"已完成":"進行中",m.completedDate?fmt(m.completedDate):"—"]);
  });
  const ws2=XLSX.utils.aoa_to_sheet(r2);

  const r3=[["送出日期","設備名稱","Asset ID","Zone","目的地","狀態","歸還日期"]];
  D.transfers.filter(t=>t.sendDate&&t.sendDate.startsWith(mo)).forEach(t=>{
    const eq=D.equipment.find(e=>e.id===t.equipmentId);
    r3.push([fmt(t.sendDate),eq?.name||"—",eq?.assetId||"—",eq?.zone||"—",t.destination,t.returned?"已歸還":"轉移中",t.returnedDate?fmt(t.returnedDate):"—"]);
  });
  const ws3=XLSX.utils.aoa_to_sheet(r3);

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws1,"每日檢查");XLSX.utils.book_append_sheet(wb,ws2,"維修紀錄");XLSX.utils.book_append_sheet(wb,ws3,"轉移紀錄");
  [ws1,ws2,ws3].forEach(ws=>{const ref=ws["!ref"];if(!ref)return;const rng=XLSX.utils.decode_range(ref),cols=[];for(let c=rng.s.c;c<=rng.e.c;c++){let mx=10;for(let r=rng.s.r;r<=rng.e.r;r++){const cl=ws[XLSX.utils.encode_cell({r,c})];if(cl&&cl.v)mx=Math.max(mx,String(cl.v).length*1.6)}cols.push({wch:Math.min(mx,32)})}ws["!cols"]=cols});
  XLSX.writeFile(wb,`PT設備管理_${mo}.xlsx`);toast("Excel 已下載 ✓");
}

async function clearAllData(){
  if(!confirm("確定清除所有資料？不可還原！"))return;
  if(!confirm("再次確認：真的要刪除？"))return;
  toast("正在清除...");
  for(const col of ["equipment","maintenance","transfers","dailyChecks","signatures"]){
    const snap=await db.collection(col).get();
    for(let s=0;s<snap.docs.length;s+=450){const batch=db.batch();snap.docs.slice(s,s+450).forEach(d=>batch.delete(d.ref));await batch.commit()}
  }
  toast("已清除全部資料");
}
